# Alembic 配置文件
# 详细说明见 https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# 迁移脚本存放路径
script_location = alembic

# 迁移文件命名格式：时间戳_描述
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# 时区
timezone = Asia/Shanghai

# 每次迁移后截断修订的 slug 长度
truncate_slug_length = 40

# 输出编码
output_encoding = utf-8

# 数据库连接 URL（由 env.py 中动态读取 .env，此处留空）
sqlalchemy.url =


[post_write_hooks]
# 可配置 black / isort 格式化迁移文件
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
